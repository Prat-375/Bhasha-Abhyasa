services:
  backend:
    build: ./backend
    container_name: ba-backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: ba-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend